packages:
  - apps/*
  - packages/*
  - examples/*

shamefullyHoist: true
strictPeerDependencies: false

allowBuilds:
  '@parcel/watcher': false
  esbuild: false
  unrs-resolver: false
  vue-demi: false
  '@nestjs/core': false
  '@swc/core': false
  workerd: false
  better-sqlite3: true
  isolated-vm: true
  sharp: true
  maplibre-gl: false

overrides:
  minimark: 0.2.0
  '@nuxtjs/mcp-toolkit': ^0.18.0
  # eve 0.12 requires AI SDK 7 when resolved from the example package tree.
  eve>ai: ^7.0.28
  # Nuxt 4.x requires @unhead/vue ^3.1.8 internally; some deps (e.g. @nuxt/ui)
  # declare a permissive `^2.0.5 || ^3.0.0` peer range that lets pnpm resolve
  # a stale v2, breaking Nuxt's `legacyPlugins` import at build time.
  '@unhead/vue': ^3.2.1

minimumReleaseAge: 2880

minimumReleaseAgeExclude:
  # Nuxt
  - '@nuxt/*'
  - '@nuxtjs/*'
  - 'nuxt'
  - 'nuxt-*'
  # Vercel
  - '@vercel/*'
  - '@ai-sdk/*'
  - 'ai'
  # Other
  - '@databuddy/nuxt'
  - '@changesets/cli@2.31.1'
  - eve@0.24.3
  - satori@0.28.0
  - tsdown@0.22.8
