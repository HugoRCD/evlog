packages:
  - apps/*
  - packages/*
  - examples/*

shamefullyHoist: true
strictPeerDependencies: false

allowBuilds:
  '@parcel/watcher': false
  esbuild: false
  unrs-resolver: false
  vue-demi: false
  better-sqlite3: true
  isolated-vm: true
  sharp: true

overrides:
  minimark: 0.2.0
  '@nuxtjs/mcp-toolkit': ^0.16.1
